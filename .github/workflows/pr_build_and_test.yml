name: PR Build and Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

  workflow_dispatch:
    inputs:
      RUNNER_LABEL:
        description: 'Match Runner Label'
        required: false
        type: string


# cancel previous job if a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doxygen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: .github/filters.yaml

      - uses: prefix-dev/setup-pixi@v0.9.5
        if: ${{ steps.changes.outputs.doxygen == 'true' || steps.changes.outputs.cpp == 'true' }}
        with:
          frozen: true

      - uses: ./.github/actions/doxygen-build
        name: Build doxygen
        if: ${{ steps.changes.outputs.doxygen == 'true' || steps.changes.outputs.cpp == 'true' }}


  build-linux:
    needs: doxygen
    uses: ./.github/workflows/build_and_test_reusable.yml
    with:
      os: Linux
      cmake_preset: linux-64-ci
      runner_label: ${{ inputs.RUNNER_LABEL || '' }}

  build-windows:
    needs: doxygen
    # Skip Windows when the PR targets ornl-next (ORNL-specific branch, Linux only)
    if: github.base_ref != 'ornl-next'
    uses: ./.github/workflows/build_and_test_reusable.yml
    with:
      os: Windows
      cmake_preset: win-64-ci
      runner_label: ${{ inputs.RUNNER_LABEL || '' }}
